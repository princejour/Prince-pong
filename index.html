<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Arial', sans-serif;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        h1 {
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            font-size: 2.5em;
            margin-top: 20px;
        }

        .scoreboard {
            display: flex;
            justify-content: space-around;
            width: 600px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            color: #fff;
            font-size: 1.5em;
            font-weight: bold;
        }

        .player-score,
        .computer-score {
            text-align: center;
            flex: 1;
        }

        .score-value {
            font-size: 2em;
            color: #4ade80;
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.5);
        }

        #gameCanvas {
            border: 3px solid #fff;
            background: #000;
            border-radius: 5px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            display: block;
        }

        .instructions {
            width: 600px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            color: #fff;
            font-size: 0.9em;
            text-align: center;
            line-height: 1.6;
        }

        .instructions strong {
            color: #4ade80;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 1em;
            background: #4ade80;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #22c55e;
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎮 PONG GAME 🎮</h1>
        
        <div class="scoreboard">
            <div class="player-score">
                <div>Player (Left)</div>
                <div class="score-value" id="playerScore">0</div>
            </div>
            <div class="computer-score">
                <div>Computer (Right)</div>
                <div class="score-value" id="computerScore">0</div>
            </div>
        </div>

        <canvas id="gameCanvas" width="800" height="400"></canvas>

        <div class="button-group">
            <button id="startBtn">Start Game</button>
            <button id="resetBtn">Reset Score</button>
        </div>

        <div class="instructions">
            <strong>Controls:</strong> Use <strong>Mouse</strong> (move left paddle) or <strong>Arrow Keys Up/Down</strong> to move your paddle<br>
            First to score 5 points wins! Computer is your opponent.
        </div>
    </div>

    <script>
        // Canvas and context
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game objects
        const paddleWidth = 10;
        const paddleHeight = 80;
        const ballSize = 7;
        const ballSpeed = 4;
        const paddleSpeed = 6;

        // Player paddle (left)
        const player = {
            x: 20,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            dy: 0,
            speed: paddleSpeed
        };

        // Computer paddle (right)
        const computer = {
            x: canvas.width - paddleWidth - 20,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            dy: 0,
            speed: paddleSpeed * 0.8 // Slightly slower for balance
        };

        // Ball
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: ballSize,
            dx: ballSpeed,
            dy: ballSpeed,
            speed: ballSpeed
        };

        // Score
        let playerScore = 0;
        let computerScore = 0;

        // Game state
        let gameRunning = false;
        let keys = {};

        // Mouse movement
        let mouseY = canvas.height / 2;

        // Event listeners
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseY = e.clientY - rect.top;
        });

        document.getElementById('startBtn').addEventListener('click', () => {
            gameRunning = !gameRunning;
            document.getElementById('startBtn').textContent = gameRunning ? 'Pause Game' : 'Start Game';
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            playerScore = 0;
            computerScore = 0;
            gameRunning = false;
            document.getElementById('startBtn').textContent = 'Start Game';
            updateScore();
            resetBall();
        });

        // Draw rectangle
        function drawRect(x, y, width, height, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, width, height);
        }

        // Draw circle
        function drawCircle(x, y, radius, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();
        }

        // Draw center line
        function drawCenterLine() {
            ctx.strokeStyle = '#fff';
            ctx.setLineDash([5, 15]);
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // Update player paddle
        function updatePlayerPaddle() {
            // Arrow keys
            if (keys['ArrowUp'] && player.y > 0) {
                player.y -= player.speed;
            }
            if (keys['ArrowDown'] && player.y < canvas.height - player.height) {
                player.y += player.speed;
            }

            // Mouse control
            const targetY = mouseY - player.height / 2;
            if (targetY > 0 && targetY < canvas.height - player.height) {
                player.y = targetY;
            }
        }

        // Update computer paddle
        function updateComputerPaddle() {
            const computerCenter = computer.y + computer.height / 2;
            
            // Simple AI: track the ball with slight delay
            if (computerCenter < ball.y - 35) {
                computer.y += computer.speed;
            } else if (computerCenter > ball.y + 35) {
                computer.y -= computer.speed;
            }

            // Keep in bounds
            if (computer.y < 0) computer.y = 0;
            if (computer.y > canvas.height - computer.height) {
                computer.y = canvas.height - computer.height;
            }
        }

        // Update ball
        function updateBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Wall collision (top and bottom)
            if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
                ball.dy = -ball.dy;
                ball.y = ball.y - ball.radius < 0 ? ball.radius : canvas.height - ball.radius;
            }

            // Player paddle collision
            if (
                ball.x - ball.radius < player.x + player.width &&
                ball.y > player.y &&
                ball.y < player.y + player.height
            ) {
                ball.dx = Math.abs(ball.dx);
                ball.x = player.x + player.width + ball.radius;
                // Add spin based on where ball hits paddle
                const deltaY = ball.y - (player.y + player.height / 2);
                ball.dy = (deltaY / (player.height / 2)) * ball.speed;
            }

            // Computer paddle collision
            if (
                ball.x + ball.radius > computer.x &&
                ball.y > computer.y &&
                ball.y < computer.y + computer.height
            ) {
                ball.dx = -Math.abs(ball.dx);
                ball.x = computer.x - ball.radius;
                // Add spin based on where ball hits paddle
                const deltaY = ball.y - (computer.y + computer.height / 2);
                ball.dy = (deltaY / (computer.height / 2)) * ball.speed;
            }

            // Scoring
            if (ball.x - ball.radius < 0) {
                computerScore++;
                updateScore();
                resetBall();
            }
            if (ball.x + ball.radius > canvas.width) {
                playerScore++;
                updateScore();
                resetBall();
            }
        }

        // Reset ball to center
        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = ballSpeed * (Math.random() > 0.5 ? 1 : -1);
            ball.dy = ballSpeed * (Math.random() > 0.5 ? 1 : -1);
        }

        // Update score display
        function updateScore() {
            document.getElementById('playerScore').textContent = playerScore;
            document.getElementById('computerScore').textContent = computerScore;
        }

        // Draw game
        function draw() {
            // Clear canvas
            drawRect(0, 0, canvas.width, canvas.height, '#000');

            // Draw center line
            drawCenterLine();

            // Draw paddles
            drawRect(player.x, player.y, player.width, player.height, '#4ade80');
            drawRect(computer.x, computer.y, computer.width, computer.height, '#ef4444');

            // Draw ball
            drawCircle(ball.x, ball.y, ball.radius, '#fff');
        }

        // Game loop
        function gameLoop() {
            if (gameRunning) {
                updatePlayerPaddle();
                updateComputerPaddle();
                updateBall();
            }

            draw();
            requestAnimationFrame(gameLoop);
        }

        // Initialize game
        updateScore();
        gameLoop();
    </script>
</body>
</html>
